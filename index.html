<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ratcharak Golf Sim</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Kanit', sans-serif; background-color: #f3f4f6; }
    .hidden-section { display: none; }
  </style>
</head>
<body class="text-gray-800">

  <div id="loading" class="flex flex-col items-center justify-center min-h-screen bg-white">
    <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-green-500 mb-4"></div>
    <p class="text-gray-500">กำลังตรวจสอบข้อมูลผู้ใช้งาน...</p>
  </div>

  <div id="customerView" class="hidden-section max-w-md mx-auto min-h-screen bg-white shadow-lg flex flex-col relative">...</div>
  <div id="adminView" class="hidden-section max-w-md mx-auto min-h-screen bg-gray-50 shadow-lg">...</div>

  <script>
    // ==========================================
    // ⚙️ ตั้งค่าระบบ (ต้องเปลี่ยน 2 ค่านี้ของคุณเอง)
    // ==========================================
    const MY_LIFF_ID = "2009708459-aHFsBA00"; 
    const GAS_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxVe3O-nSGXRoDJGHP9-wSajYE31rh-X1AFA68VDuY6UAnrhBv25MKKQoyoDCA72rqD/exec";

    let currentUserUid = "";

    async function main() {
      await liff.init({ liffId: MY_LIFF_ID });
      
      if (!liff.isLoggedIn()) {
        liff.login();
        return;
      }
      
      const profile = await liff.getProfile();
      currentUserUid = profile.userId;
      
      // ดึงข้อมูลผ่าน Fetch API แทน google.script.run
      try {
        const response = await fetch(`${GAS_WEB_APP_URL}?action=getUserProfile&uid=${currentUserUid}`);
        const data = await response.json();
        
        document.getElementById('loading').style.display = 'none';
        
        if (data.role === "Admin") {
          document.getElementById('adminView').style.display = 'block';
          document.getElementById('adminName').textContent = "ผู้ทำรายการ: " + data.name;
        } else {
          document.getElementById('customerView').style.display = 'block';
          document.getElementById('cusName').textContent = profile.displayName;
          document.getElementById('cusProfilePic').src = profile.pictureUrl || "https://via.placeholder.com/150";
        }
      } catch (error) {
        document.getElementById('loading').style.display = 'none';
        Swal.fire('ข้อผิดพลาด', 'ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ฐานข้อมูลได้', 'error');
      }
    }

    main();

    async function submitUsage() {
      const targetUid = document.getElementById('targetUid').value.trim();
      const hours = document.getElementById('useHours').value.trim();

      if (!targetUid || !hours) {
        Swal.fire('ข้อมูลไม่ครบ', 'กรุณากรอก UID ลูกค้า และจำนวนชั่วโมง', 'warning');
        return;
      }

      const result = await Swal.fire({
        title: 'ยืนยันการทำรายการ?',
        text: `หักเวลา ${hours} ชั่วโมง สำหรับลูกค้ารหัส ${targetUid} ใช่หรือไม่?`,
        icon: 'question',
        showCancelButton: true,
        confirmButtonColor: '#2563eb',
        cancelButtonColor: '#d1d5db',
        confirmButtonText: 'ยืนยันการหัก',
        cancelButtonText: 'ยกเลิก'
      });

      if (result.isConfirmed) {
        const btn = document.getElementById('btnSubmit');
        btn.innerHTML = 'กำลังบันทึกข้อมูล...';
        btn.disabled = true;

        try {
          // ส่งข้อมูลบันทึกผ่าน Fetch API
          const response = await fetch(`${GAS_WEB_APP_URL}?action=recordUsage&adminUid=${currentUserUid}&customerUid=${targetUid}&hours=${hours}`);
          const res = await response.json();

          btn.innerHTML = 'บันทึกการหักเวลา';
          btn.disabled = false;
          
          if (res.success) {
            Swal.fire('สำเร็จ!', res.message, 'success').then(() => {
              document.getElementById('targetUid').value = "";
              document.getElementById('useHours').value = "";
            });
          } else {
            Swal.fire('ไม่สามารถทำรายการได้', res.message, 'error');
          }
        } catch (error) {
          btn.innerHTML = 'บันทึกการหักเวลา';
          btn.disabled = false;
          Swal.fire('ข้อผิดพลาดระบบ', 'การส่งข้อมูลล้มเหลว กรุณาลองใหม่', 'error');
        }
      }
    }

    function bookTime() {
      Swal.fire({
        title: 'ฟีเจอร์กำลังพัฒนา',
        text: 'ระบบจองเวลาจะพร้อมให้บริการเร็วๆ นี้ครับ',
        icon: 'info',
        confirmButtonColor: '#10b981'
      });
    }
  </script>
</body>
</html>
